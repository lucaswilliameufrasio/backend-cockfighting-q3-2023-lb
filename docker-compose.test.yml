services:
  api1:
    build:
      context: .
      dockerfile: Dockerfile.mock
    environment:
      PORT: "8080"
    expose:
      - "8080"

  api2:
    build:
      context: .
      dockerfile: Dockerfile.mock
    environment:
      PORT: "8081"
    expose:
      - "8081"

  lb:
    build: .
    environment:
      LISTEN: "0.0.0.0:9999"
      UPSTREAMS: "api1:8080,api2:8081"
    depends_on:
      - api1
      - api2
    ports:
      - "9999:9999"
